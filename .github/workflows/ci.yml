name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    # Frontend
    - name: Setup Node
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Install & Build Frontend
      run: |
        npm install
        npm run build

    # Backend
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.11

    - name: Install Backend
      run: |
        cd backend
        pip install -r requirements.txt

    - name: Check Backend
      run: |
        cd backend
        python -m py_compile main.py
    - name: Run Backend Tests
       run: |
        cd backend
        pytest